<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register konto — Deckforge</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="hero-eyebrow">✦ Velkommen ✦</span>
            <h1>Register bruger</h1>
            <p class="auth-subtitle">Træd ind i din fremtidige samlingen</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-field">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" th:field="*{authority.email}" class="form-input"
                       placeholder="F.eks. bruger@gmail.com" required autofocus>
            </div>

            <div class="form-field">
                <label for="password" class="form-label">Password:</label>
                <input type="text" id="password" th:field="*{authority.password}" class="form-input" required>
            </div>
            <div class="form-field">
                <label for="name" class="form-label">Navn:</label>
                <input type="text" id="name" th:field="*{name}" class="form-input" required>
            </div>

            <div class="form-field">
                <label for="dateOfBirth" class="form-label">Fødselsdag:</label>
                <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}"
                       class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Opret</button>
            </div>
        </form>

        <div class="auth-divider">eller</div>
        <h3><a th:href="@{index}">Til Start</a></h3>
        <h3><a th:href="@{login}">Til Login</a></h3>
    </div>
</section>
</body>
</html>

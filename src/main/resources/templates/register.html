<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Create Account</h1>


<form th:action="@{/register}" th:object="${user}" method="post">

    <div class="field">
        <label for="email">Email:</label><br>
        <input type="text" id="email" th:field="*{authority.email}" placeholder="F.eks. bruger@gmail.com" required><br><br>
    </div>
    <div class="field">
        <label for="password">Password:</label><br>
        <input type="password" id="password" th:field="*{authority.password}" required><br><br>
    </div>
    <div class="field">
        <label for="name">Navn:</label><br>
        <input type="text" id="name" th:field="*{name}" required><br><br>
    </div>
    <div class="field">
        <label for="dateOfBirth">Fødselsdag:</label><br>
        <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}" required><br><br>
    </div>
    <button type="submit">Opret</button>

</form>

<div class="divider">Eller</div>

<h3><a th:href="@{index}">Til Start</a></h3>

<h4><a th:href="@{login}">Til Login</a></h4>
</body>
</html>

<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind - Deckforge</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Log ind</h1>
            <p class="auth-subtitle">Velkommen tilbage</p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-field">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="text" id="email" name="email"
                       placeholder="F.eks. bruger@gmail.com" required>
            </div>

            <div class="form-field">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Log ind</button>
            </div>
        </form>

        <div class="auth-divider">Eller</div>

        <div class="auth-footer">
            <p>Har du ikke en konto? <a th:href="@{/register}">Opret konto</a></p>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-ornament">⚜ ✦ ⚜</div>
        <p class="footer-text">Deckforge · Anno MMXXVI</p>
    </div>
</footer>
</body>
</html>

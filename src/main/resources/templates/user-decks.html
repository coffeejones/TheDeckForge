<!DOCTYPE html>
<html lang="en">
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1 th:text="|${user.name}s decks|">Users decks</h1>
<div th:if="${#lists.isEmpty(user.getDecks())}" class="empty-state">
    <p class="hero-tagline">Du har ingen decks endnu. Tilføj dit første deck!</p>
</div>
<div class="hero-actions" style="justify-content: center;">
    <a th:href="@{/decks/deck-creator}" class="btn btn-primary">Nyt deck</a>
</div>
<div th:if="${!#lists.isEmpty(user.getDecks())}">
    <div th:each="deck : ${user.getDecks()}">
            <div class="hero-tagline" th:text="${deck.getName()}">Deck Name</div>
            <div class="hero-eyebrow" th:if="${deck.getFormat().toString() == 'COMMANDER'}"> Commander</div>
            <div class="hero-eyebrow" th:if="${deck.getFormat().toString() == 'STANDARD'}"> Standard</div>
            <div class="hero-eyebrow" th:if="${deck.getFormat().toString() == 'DRAFT'}"> Draft</div>
        <div class="hero-tagline" th:text="|Kort størrelse ${deck.getCards().size()}|"></div>
        <a  th:href="@{/decks/deck-editor/{id}(id=${deck.name})}" class="btn-secondary">Ændre på decket</a>
    </div>
</div>


</body>
</html>

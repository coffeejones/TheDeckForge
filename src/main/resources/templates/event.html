<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Deckforge — Events</title>
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- PAGE HEADER -->
<section style="padding: var(--space-12) 0 var(--space-4);">
    <div class="container">
        <div class="section-header">
            <h2>Events</h2>
            <p class="section-subtitle" id="eventCount">Indkalder begivenheder fra det arkaniske...</p>
        </div>
    </div>
</section>

<!-- SEARCH & FILTER -->
<section style="padding: 0 0 var(--space-8);">
    <div class="container">

        <div class="filter-bar">
            <input class="filter-input" type="text" id="searchInput"
                   placeholder="Søg efter navn eller sted..." oninput="filterEvents()" />
            <button class="btn btn-primary" onclick="openCreateModal()">✦ Ny Event</button>
        </div>

        <!-- ERROR BANNER -->
        <div id="errorBanner" style="display:none; padding:1rem 1.5rem; margin-bottom:1.5rem;
             background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
             border-radius:var(--radius); color:#fca5a5; font-style:italic; text-align:center;">
        </div>

        <!-- EVENTS GRID -->
        <div id="eventsGrid" class="stats" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
            <div style="grid-column:1/-1; text-align:center; padding:4rem;
                 color:var(--ink-muted); font-style:italic; font-family:var(--font-body);">
                Konsulterer oraklet...
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <div class="footer-ornament">⚜ ✦ ⚜</div>
        <p class="footer-text">Deckforge · Anno MMXXVI · For samlere og spillere</p>
    </div>
</footer>

<!-- CREATE / EDIT MODAL -->
<div id="modalOverlay" onclick="handleOverlayClick(event)" style="
     display:none; position:fixed; inset:0;
     background:rgba(10,6,18,0.88); backdrop-filter:blur(8px);
     align-items:center; justify-content:center; z-index:200;">
    <div class="auth-card" style="max-width:520px; width:95%;">
        <div class="auth-header">
            <h1 id="modalTitle" style="font-size:1.8rem;">Ny Event</h1>
            <p class="auth-subtitle" id="modalSubtitle">Registrér en ny begivenhed i den arkaniske bog</p>
        </div>
        <div class="form-field">
            <label class="form-label">Navn</label>
            <input class="form-input" type="text" id="f-name" placeholder="f.eks. Sommer Draft Aften" />
        </div>
        <div class="form-field">
            <label class="form-label">Dato</label>
            <input class="form-input" type="date" id="f-date" />
        </div>
        <div class="form-field">
            <label class="form-label">Sted</label>
            <input class="form-input" type="text" id="f-location" placeholder="f.eks. København" />
        </div>
        <div class="form-field">
            <label class="form-label">Beskrivelse</label>
            <textarea class="form-input" id="f-desc" rows="3"
                      style="resize:vertical;" placeholder="Beskriv denne begivenhed..."></textarea>
        </div>
        <div style="display:flex; gap:1rem; margin-top:2rem;">
            <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Annuller</button>
            <button class="btn btn-primary" style="flex:1;" onclick="saveEvent()">✦ Gem Event</button>
        </div>
    </div>
</div>

<!-- ADD PARTICIPANT MODAL -->
<div id="participantOverlay" onclick="handleParticipantOverlayClick(event)" style="
     display:none; position:fixed; inset:0;
     background:rgba(10,6,18,0.88); backdrop-filter:blur(8px);
     align-items:center; justify-content:center; z-index:200;">
    <div class="auth-card" style="max-width:380px; width:95%;">
        <div class="auth-header">
            <h1 style="font-size:1.6rem;">Tilføj Deltager</h1>
            <p class="auth-subtitle">Indskriv en mester i denne begivenhed</p>
        </div>
        <div class="form-field">
            <label class="form-label">Bruger ID</label>
            <input class="form-input" type="number" id="p-userId" placeholder="f.eks. 42" />
        </div>
        <div style="display:flex; gap:1rem; margin-top:2rem;">
            <button class="btn btn-secondary" style="flex:1;" onclick="closeParticipantModal()">Annuller</button>
            <button class="btn btn-primary" style="flex:1;" onclick="submitParticipant()">✦ Tilføj</button>
        </div>
    </div>
</div>

<script>
    const API = '/api/events';
    let allEvents = [];
    let editingId = null;
    let participantTargetId = null;

    /* ── CSRF ── */
    function getCsrf() {
        return {
            header: document.querySelector('meta[name="_csrf_header"]')?.content,
            token:  document.querySelector('meta[name="_csrf"]')?.content
        };
    }

    /* ── TOAST ── */
    function toast(msg) {
        const existing = document.querySelector('.toast-notification');
        if (existing) existing.remove();
        const t = document.createElement('div');
        t.className = 'toast-notification';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3100);
    }

    /* ── ERROR BANNER ── */
    function showError(msg) {
        const b = document.getElementById('errorBanner');
        b.textContent = msg;
        b.style.display = 'block';
    }
    function hideError() {
        document.getElementById('errorBanner').style.display = 'none';
    }

    /* ── API HELPER ── */
    async function apiFetch(url, options = {}) {
        const { header, token } = getCsrf();
        const res = await fetch(url, {
            headers: {
                'Content-Type': 'application/json',
                [header]: token
            },
            ...options
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        if (res.status === 204) return null;
        return res.json();
    }

    /* ── LOAD ── */
    async function loadEvents() {
        try {
            allEvents = await apiFetch(API);
            hideError();
            renderEvents(allEvents);
        } catch (e) {
            showError('Kunne ikke nå serveren. Kører Spring på port 8080?');
            document.getElementById('eventsGrid').innerHTML = '';
            document.getElementById('eventCount').textContent = 'Forbindelse fejlede';
        }
    }

    /* ── FILTER ── */
    function filterEvents() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allEvents.filter(e =>
            e.name.toLowerCase().includes(q) ||
            (e.location || '').toLowerCase().includes(q)
        );
        renderEvents(filtered);
    }

    /* ── RENDER ── */
    function renderEvents(events) {
        const grid = document.getElementById('eventsGrid');
        const count = document.getElementById('eventCount');

        count.innerHTML = `
            <strong style="color:var(--gold-bright); font-family:var(--font-mono);">${events.length}</strong>
            begivenhed${events.length !== 1 ? 'er' : ''} fundet i den arkaniske bog`;

        if (events.length === 0) {
            grid.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:var(--space-16) var(--space-8);
                     border:1px dashed rgba(240,198,116,0.25); border-radius:var(--radius-lg);
                     background:rgba(20,9,42,0.4);">
                    <div style="font-size:2.5rem; color:var(--gold); opacity:0.5; margin-bottom:var(--space-4);">✦</div>
                    <p style="color:var(--ink-muted); font-style:italic; margin-bottom:var(--space-6);">
                        Ingen begivenheder fundet i den arkaniske bog.
                    </p>
                    <button class="btn btn-primary" onclick="openCreateModal()">✦ Opret Første Event</button>
                </div>`;
            return;
        }

        grid.innerHTML = events.map((e, i) => `
            <div class="stat" style="text-align:left; cursor:default;
                 animation:fadeUp 0.4s var(--ease-out) ${i * 50}ms both;
                 display:flex; flex-direction:column; gap:var(--space-3);">

                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div style="font-family:var(--font-display); font-size:1rem; font-weight:700;
                             color:var(--gold-bright); letter-spacing:0.03em; line-height:1.3;">
                            ${esc(e.name)}
                        </div>
                        <div style="font-family:var(--font-body); font-size:0.85rem;
                             color:var(--ink-muted); font-style:italic; margin-top:2px;">
                            📍 ${esc(e.location) || 'Sted TBD'}
                        </div>
                    </div>
                    <div style="font-family:var(--font-display); font-size:1.5rem;
                         color:var(--gold); opacity:0.5; flex-shrink:0; margin-left:0.5rem;">✦</div>
                </div>

                <div style="font-family:var(--font-mono); font-size:0.8rem;
                     color:var(--gold); letter-spacing:0.15em; text-transform:uppercase;">
                    ${esc(e.date) || 'Dato TBD'}
                </div>

                ${e.description ? `
                    <p style="font-size:0.85rem; color:var(--ink-muted); font-style:italic;
                       line-height:1.5; margin:0; overflow:hidden; display:-webkit-box;
                       -webkit-line-clamp:2; -webkit-box-orient:vertical;">
                        ${esc(e.description)}
                    </p>` : ''}

                <div style="display:flex; flex-wrap:wrap; gap:4px; min-height:20px;">
                    ${(e.participants && e.participants.length > 0)
            ? e.participants.map(p => `
                            <span style="background:var(--void); border:1px solid var(--amethyst);
                                border-radius:999px; padding:1px 10px; font-family:var(--font-mono);
                                font-size:0.7rem; color:var(--ink-muted);">ID ${p}</span>`).join('')
            : `<span style="font-size:0.78rem; color:var(--ink-faint); font-style:italic;">
                               Ingen deltagere endnu</span>`}
                </div>

                <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:auto;
                     padding-top:var(--space-3); border-top:1px solid rgba(240,198,116,0.15);">
                    <button class="filter-chip" style="font-size:0.7rem;"
                        onclick="openEditModal(${e.id})">✦ Rediger</button>
                    <button class="filter-chip" style="font-size:0.7rem;"
                        onclick="openParticipantModal(${e.id})">+ Deltag</button>
                    <button class="filter-chip" style="font-size:0.7rem; margin-left:auto;
                        border-color:rgba(239,68,68,0.35); color:#fca5a5;"
                        onclick="deleteEvent(${e.id})">Slet</button>
                </div>
            </div>
        `).join('');
    }

    /* ── MODALS ── */
    function openCreateModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Ny Event';
        document.getElementById('modalSubtitle').textContent = 'Registrér en ny begivenhed i den arkaniske bog';
        ['name','date','location','desc'].forEach(f => document.getElementById('f-'+f).value = '');
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function openEditModal(id) {
        const e = allEvents.find(x => x.id === id);
        if (!e) return;
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Rediger Event';
        document.getElementById('modalSubtitle').textContent = 'Ændr den arkaniske optegnelse';
        document.getElementById('f-name').value = e.name || '';
        document.getElementById('f-date').value = e.date || '';
        document.getElementById('f-location').value = e.location || '';
        document.getElementById('f-desc').value = e.description || '';
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function handleOverlayClick(ev) {
        if (ev.target === document.getElementById('modalOverlay')) closeModal();
    }

    async function saveEvent() {
        const name = document.getElementById('f-name').value.trim();
        const date = document.getElementById('f-date').value;
        const location = document.getElementById('f-location').value.trim();
        const description = document.getElementById('f-desc').value.trim();
        if (!name) { document.getElementById('f-name').focus(); return; }

        const body = { name, date, location, description, participants: [] };
        try {
            if (editingId) {
                await apiFetch(`${API}/${editingId}`, { method: 'PUT', body: JSON.stringify(body) });
                toast('✦ Event opdateret i den arkaniske bog');
            } else {
                await apiFetch(API, { method: 'POST', body: JSON.stringify(body) });
                toast('✦ Event besværget med succes');
            }
            closeModal();
            await loadEvents();
        } catch (err) {
            console.error('Fejl ved gem event:', err);
            toast('⚠ Det arkaniske ritual fejlede. Prøv igen.');
        }
    }

    /* ── DELETE ── */
    async function deleteEvent(id) {
        if (!confirm('Fjern denne begivenhed fra den arkaniske bog for evigt?')) return;
        try {
            await apiFetch(`${API}/${id}`, { method: 'DELETE' });
            toast('✦ Event fjernet fra bogen');
            await loadEvents();
        } catch (err) {
            toast('⚠ Kunne ikke fjerne denne event.');
        }
    }

    /* ── PARTICIPANTS ── */
    function openParticipantModal(eventId) {
        participantTargetId = eventId;
        document.getElementById('p-userId').value = '';
        document.getElementById('participantOverlay').style.display = 'flex';
    }

    function closeParticipantModal() {
        document.getElementById('participantOverlay').style.display = 'none';
    }

    function handleParticipantOverlayClick(ev) {
        if (ev.target === document.getElementById('participantOverlay')) closeParticipantModal();
    }

    async function submitParticipant() {
        const userId = parseInt(document.getElementById('p-userId').value);
        if (isNaN(userId)) return;
        try {
            const { header, token } = getCsrf();
            const res = await fetch(`${API}/${participantTargetId}/participants/${userId}`, {
                method: 'POST',
                headers: { [header]: token }
            });
            if (res.ok) {
                toast('✦ Mester indskrevet i begivenheden');
                closeParticipantModal();
                await loadEvents();
            } else if (res.status === 400) {
                toast('⚠ Denne mester er allerede indskrevet');
            } else {
                toast('⚠ Indskrivningsritualet fejlede');
            }
        } catch (err) {
            toast('⚠ Kunne ikke nå serveren');
        }
    }

    /* ── UTILS ── */
    function esc(str) {
        if (!str) return '';
        return str
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') { closeModal(); closeParticipantModal(); }
    });

    loadEvents();
</script>

</body>
</html>

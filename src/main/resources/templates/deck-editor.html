<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lav et deck</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-footer">
    <p>Tilbage til <a th:href="@{/decks/deck-editor/{deckId}/save-deck(deckId=${deck.getName()})}">decks</a></p>
</div>
<div class="hero-tagline" th:text="|deck størrelse: ${deck.getCards().size()}|"></div>
<div th:if="${#lists.isEmpty(deck.getCards())}" class="empty-state">
    <p class="hero-tagline">Du har ingen kort i dit deck endnu. Tilføj dit første kort!</p>
</div>
<div th:unless="${deck.getCards().isEmpty()}" class="collection-grid">
    <a th:each="card : ${deck.getCards()}"
       th:href="@{/cards/card-detail/{id}(id=${card.id})}"
       class="collection-card">
        <div class="collection-card-image">
            <img th:src="${card.pictureRef}" th:alt="${card.cardName}">
        </div>
        <div class="collection-card-name" th:text="${card.cardName}">Card Name</div>
        <Div>
            <form id="remove-from-deck" th:action="@{/decks/deck-editor/{cardId}/{deckId}/remove(cardId=${card.id}, deckId=${deck.getName})}" method="post">
                <button type="submit" class="btn btn-secondary">fjern fra decket</button>
            </form>
        </div>
    </a>
</div>
<section class="collection-page">
    <div class="container">

        <header class="collection-header">
            <span class="hero-eyebrow">✦ Find kort til dit deck ✦</span>
            <h1>Kort</h1>
            <p class="section-subtitle" th:if="${!#lists.isEmpty(searchResults)}">
                <strong th:text="${#lists.size(searchResults)}">0</strong> kort fundet
            </p>
        </header>

        <form class="search-bar" th:action="@{/decks/deck-editor/{deckId}/deck-card-list(deckId =${deck.getName()})}" method="get">
            <input type="text" name="searchTerm"
                   class="form-input"
                   placeholder="Søg igen..."
                   th:value="${param.searchTerm}">
            <button type="submit" class="btn btn-primary">Søg</button>
        </form>

        <div th:unless="${#lists.isEmpty(searchResults)}" class="collection-grid">
            <a th:each="card : ${searchResults}"
               th:href="@{/cards/card-detail/{id}(id=${card.id})}"
               class="collection-card">
                <div class="collection-card-image">
                    <img th:src="${card.pictureRef}" th:alt="${card.cardName}">
                </div>
                <div class="collection-card-name" th:text="${card.cardName}">Card Name</div>
                <Div>
                    <form id="add-to-deck" th:action="@{/decks/deck-editor/{cardId}/{deckId}/add(cardId=${card.id}, deckId=${deck.getName})}" method="post">
                        <button type="submit" class="btn btn-secondary">tilføj til decket</button>
                    </form>
                </div>
            </a>
        </div>

    </div>
</section>


<script>
    var pendingToast = sessionStorage.getItem('toastMessage');
    if (pendingToast) {
        sessionStorage.removeItem('toastMessage');
        showToast(pendingToast);
    }

    function setupForm(id, successMessage) {
        var form = document.getElementById(id);
        if (!form) return;
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var csrfToken = document.querySelector('meta[name="_csrf"]').content;
            var csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
            var headers = {};
            headers[csrfHeader] = csrfToken;
            fetch(this.action, {method: 'POST', headers: headers})
                .then(function (response) {
                    if (response.ok) {
                        sessionStorage.setItem('toastMessage', successMessage);
                        window.location.reload();
                    } else showToast('Noget gik galt.');
                });
        });
    }

    setupForm('add-to-deck', 'Kort tilføjet til decket!');
    setupForm('remove-from-deck', 'Kort fjernet fra decket!');

    function showToast(message) {
        var toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function () {
            toast.remove();
        }, 3000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Søg kort — Deckforge</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="search-page">
    <div class="container">
        <header class="section-header">
            <span class="hero-eyebrow">✦ Det Store Bibliotek ✦</span>
            <h2>Søg kort</h2>
            <p class="section-subtitle">
                Find ethvert kort i samlingen — efter navn, sæt eller sjældenhed.
            </p>
        </header>

        <form class="search-bar" th:action="@{/cards/card-list}" method="get">
            <input type="text" name="searchTerm"
                   class="form-input"
                   placeholder="Skriv et kortnavn..." autofocus>
            <select name="cardType" class="form-input">
                <option value="">Alle typer</option>
                <option th:each="type : ${cardTypes}"
                        th:value="${type}"
                        th:text="${type}"
                        th:selected="${param.cardType == type.name()}">
                </option>
            </select>
            <button type="submit" class="btn btn-primary">Søg</button>
        </form>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-ornament">⚜ ✦ ⚜</div>
        <p class="footer-text">Deckforge · Anno MMXXVI</p>
    </div>
</footer>

</body>
</html>

spring.application.name=TheDeckForge

# Database — env vars med localhost-fallback til lokal udvikling
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/TheDeckForge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Statiske ressourcer
spring.web.resources.static-locations=classpath:/static/
spring.mvc.contentnegotiation.media-types.webp=image/webp

# SQL init — KIG: 'always' nulstiller DB ved hver opstart
spring.sql.init.mode=always
spring.sql.init.separator=;

# Thymeleaf
spring.thymeleaf.cache=false

# Port — Railway sætter $PORT automatisk, 8080 er fallback lokalt
server.port=${PORT:8080}

# Vigtigt for HTTPS bag Railway's proxy — så Spring Security ikke roder med URLs
server.forward-headers-strategy=framework
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.open-in-view=false
